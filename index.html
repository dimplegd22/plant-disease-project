<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            color: #333;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #4caf50, #009688);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 20px;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        nav ul li a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* Main Content */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
            animation: fadeIn 2s ease;
        }

        .container h1 {
            margin-bottom: 30px;
            font-size: 32px;
            color: #009688;
            font-weight: 600;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }

        form {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            display: inline-block;
            text-align: left;
            width: 100%;
            animation: slideIn 0.5s ease;
        }

        label {
            font-weight: 600;
            display: block;
            margin: 10px 0 5px;
            color: #1e88e5;
        }

        input,
        textarea,
        select {
            width: calc(100% - 20px);
            margin: 5px 0 15px;
            padding: 12px;
            border: 2px solid #1e88e5;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="file"] {
            padding: 10px;
        }

        input[type="submit"] {
            background-color: #4caf50; /* Green color */
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: background-color 0.3s ease, transform 0.3s ease;
            width: 100%;
            padding: 15px;
        }

        input[type="submit"]:hover {
            background-color: #009688; /* Darker green on hover */
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            background: linear-gradient(135deg, #4caf50, #009688);
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Media Queries */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.5rem;
            }

            nav ul {
                gap: 10px;
            }

            .container {
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <h1>Farmers Hub</h1>
        <nav>
            <ul>
                <li><a href="http://localhost:3000/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="container">
        <h1>Upload a Plant Image for Disease Detection</h1>
        <form action="/predict" method="POST" enctype="multipart/form-data">
            <label for="file">Choose an image of a plant leaf:</label>
            <input type="file" name="file" required>

            <label for="symptoms_text">Enter symptoms (Optional):</label>
            <textarea name="symptoms_text" rows="4" placeholder="Enter symptoms here..."></textarea>

            <label for="language">Choose Language:</label>
            <select name="language">
                <option value="en">English</option>
                <option value="kn">Kannada</option>
                <option value="hi">Hindi</option>
                <option value="ta">Tamil</option>
                <option value="te">Telugu</option>
            </select>

            <input type="submit" value="Predict Disease">
        </form>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Farmers Hub. Empowering Farmers for a Better Tomorrow.</p>
    </footer>
</body>

</html>
